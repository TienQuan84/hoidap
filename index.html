<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay Học Tập - Lớp 1</title>
    <style>
        :root {
            --primary-color: #2ecc71;
            --secondary-color: #3498db;
            --danger-color: #e74c3c;
            --bg-color: #f0f2f5;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .main-container { display: flex; width: 100vw; height: 100vh; }

        .left-section {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative; background: #fff;
        }

        .teacher-info {
            position: absolute;
            top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 15;
        }

        .wheel-container {
            position: relative; width: 88vh; height: 88vh; max-width: 48vw;
            margin-top: 20px;
        }

        canvas {
            width: 100%; height: 100%;
            border: 15px solid #333; border-radius: 50%;
            box-shadow: 0 0 50px rgba(0,0,0,0.3);
        }

        .arrow {
            position: absolute; right: -20px; top: 50%;
            transform: translateY(-50%) rotate(90deg);
            width: 0; height: 0;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-top: 60px solid #ff4757;
            z-index: 10;
        }

        #spin-btn {
            position: absolute; bottom: 30px;
            padding: 20px 60px; font-size: 26px; font-weight: bold;
            color: white; background: linear-gradient(135deg, #e67e22, #d35400);
            border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 8px #a04000; z-index: 20;
        }

        #spin-btn:active { transform: translateY(4px); box-shadow: 0 4px #a04000; }
        #spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .right-section {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 40px; background: #2c3e50;
            border-left: 5px solid #1a252f;
        }

        .question-card {
            background: white; width: 95%; max-width: 800px;
            padding: 40px; border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4); text-align: center;
        }

        #result-banner { font-size: 32px; font-weight: 900; color: #2c3e50; margin-bottom: 10px; }
        #winner-name {
            font-size: 40px; margin-bottom: 30px; padding: 15px;
            background: #f1c40f; border-radius: 15px; font-weight: bold;
        }

        #display-question {
            display: none; font-size: 32px; font-weight: bold;
            padding: 30px; background: #e8f5e9; border-left: 15px solid #2ecc71;
            border-radius: 20px; color: #1b5e20; line-height: 1.4;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="left-section">
        <div class="teacher-info">Giáo viên: Lê Thị Thanh Lan</div>
        
        <div class="wheel-container">
            <div class="arrow"></div>
            <canvas id="wheel" width="1000" height="1000"></canvas>
        </div>
        <button id="spin-btn">Bắt đầu quay</button>
    </div>

    <div class="right-section">
        <div class="question-card">
            <div id="result-banner">Vòng Quay Học Tập</div>
            <div id="winner-name">Sẵn sàng chưa?</div>
            <div id="display-question">Em và gia đình có thể làm gì để bảo vệ môi trường?</div>
        </div>
    </div>
</div>

<script>
    const STUDENT_LIST = ["Tú Anh", "Thiên Ân", "Quốc Bảo", "Trường Chinh", "Bùi Hân", "Lê Hân", "Minh Hiếu", "Gia Huy", "Khánh Huyền", "Bảo Lan", "Mỹ Linh", "Minh Luân", "Đức Minh", "Hải Nam", "Bảo Ngọc", "Phúc Nguyên", "An Nhiên", "Quỳnh Như", "Minh Thư", "Tú Uyên", "Lê Vy", "Kim Vy", "Trúc Vy"];
    
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('spin-btn');
    const banner = document.getElementById('result-banner');
    const winnerDisplay = document.getElementById('winner-name');
    const displayQ = document.getElementById('display-question');

    const size = STUDENT_LIST.length;
    const arc = Math.PI / (size / 2);
    let startAngle = 0;
    let isSpinning = false;
    let lastTickAngle = 0;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTick() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function playWinSound() {
        const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51]; 
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + (i * 0.12));
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime + (i * 0.12));
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (i * 0.12) + 0.6);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + (i * 0.12));
            osc.stop(audioCtx.currentTime + (i * 0.12) + 0.6);
        });
    }

    function drawWheel() {
        ctx.clearRect(0, 0, 1000, 1000);
        for (let i = 0; i < size; i++) {
            const angle = startAngle + i * arc;
            ctx.fillStyle = i % 2 === 0 ? `hsl(${i * (360 / size)}, 70%, 65%)` : `hsl(${i * (360 / size)}, 70%, 85%)`;
            ctx.beginPath();
            ctx.moveTo(500, 500);
            ctx.arc(500, 500, 480, angle, angle + arc, false);
            ctx.fill();
            ctx.save();
            ctx.fillStyle = "#000";
            ctx.font = 'bold 28px Arial';
            ctx.translate(500, 500);
            ctx.rotate(angle + arc / 2);
            ctx.fillText(STUDENT_LIST[i], 200, 10);
            ctx.restore();
        }
    }

    btn.addEventListener('click', () => {
        if (isSpinning) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        btn.disabled = true;
        resetView();
        isSpinning = true;
        let startTime = Date.now();
        let duration = 7000 + Math.random() * 3000;
        let initialAngle = startAngle;
        let totalRotation = (Math.PI * 2 * (10 + Math.random() * 5));

        function animate() {
            let elapsed = Date.now() - startTime;
            if (elapsed >= duration) {
                isSpinning = false;
                stopWheel();
                return;
            }
            let t = elapsed / duration;
            let easing = 1 - Math.pow(1 - t, 3);
            startAngle = initialAngle + (totalRotation * easing);
            if (Math.abs(startAngle - lastTickAngle) > arc) {
                playTick(); lastTickAngle = startAngle;
            }
            drawWheel();
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    });

    function stopWheel() {
        const degrees = (startAngle * 180 / Math.PI);
        const index = Math.floor((360 - (degrees % 360)) / (360 / size));
        winnerDisplay.innerText = "⭐ " + STUDENT_LIST[index % size] + " ⭐";
        banner.innerText = "CHÚC MỪNG!";
        playWinSound(); 
        displayQ.style.display = 'block'; // Hiển thị câu hỏi ngay lập tức
        btn.disabled = false;
    }

    function resetView() {
        banner.innerText = "Vòng Quay Học Tập";
        winnerDisplay.innerText = "Đang quay...";
        displayQ.style.display = 'none';
    }

    drawWheel();
</script>

</body>
</html>
