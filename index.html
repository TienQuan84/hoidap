<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HĐND Xã Bắc Ruộng - Danh sách Đại biểu</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Bungee&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #f7d794; 
            --text-dark: #2c3e50;
            --accent-gold: #b8860b;
            --highlight-gold: #f1c40f;
            --name-red: #9f0303;
        }

        body {
            margin: 0; padding: 20px;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(247, 215, 148, 0.92), rgba(247, 215, 148, 0.92)),
                url('https://www.transparenttextures.com/patterns/natural-paper.png'),
                url('https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Bronze_drum_surface.svg/1024px-Bronze_drum_surface.svg.png');
            background-repeat: no-repeat, repeat, no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover, auto, 70%;
            color: var(--text-dark);
            font-family: 'Montserrat', sans-serif;
            scroll-behavior: smooth;
        }

        .container { width: 100%; max-width: 1300px; margin: 0 auto; position: relative; z-index: 1; }

        .header-title {
            text-align: center; 
            margin-bottom: 30px;
            padding-bottom: 20px;
        }

        .header-title h1 {
            font-family: 'Bungee', cursive;
            font-size: clamp(24px, 5vw, 45px);
            color: #d63031; margin: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .summary-units {
            display: flex;
            justify-content: flex-start;
            gap: 12px;
            margin: 20px auto;
            padding: 15px 5px;
            overflow-x: auto; 
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            max-width: 100%;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-gold) transparent;
        }

        .summary-units::-webkit-scrollbar { height: 4px; }
        .summary-units::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
        .summary-units::-webkit-scrollbar-thumb { background: var(--accent-gold); border-radius: 10px; }

        .unit-chip {
            display: inline-block;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 900;
            border: 2px solid var(--accent-gold);
            color: var(--text-dark);
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .unit-chip:hover {
            background: white;
            transform: scale(1.05);
            border-color: var(--name-red);
        }

        .unit-chip.active {
            background: var(--name-red);
            color: white;
            border-color: #5e0202;
            box-shadow: 0 4px 12px rgba(159, 3, 3, 0.4);
        }

        .dv-section { 
            margin-bottom: 80px; 
            width: 100%; 
            padding-top: 20px;
        }

        .dv-header {
            font-family: 'Bungee'; font-size: 20px;
            margin-bottom: 40px; padding: 10px 0;
            border-bottom: 2px solid var(--unit-color);
            text-transform: uppercase;
            color: var(--unit-color);
        }

        .dv-list-horizontal {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        .dai-bieu-item {
            display: flex; flex-direction: column;
            align-items: center; text-align: center;
            transition: all 0.6s ease;
            opacity: 0; transform: translateY(30px);
        }

        .dai-bieu-item.reveal { opacity: 1; transform: translateY(0); }

        .avatar-box {
            width: 180px; height: 240px;
            border-radius: 0; border: 5px solid #fff;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            overflow: hidden; background: #ddd;
            margin-bottom: 15px; position: relative;
        }

        .dai-bieu-item:hover .avatar-box {
            border-color: var(--highlight-gold);
            transform: translateY(-8px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.3);
        }

        .avatar-box img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            display: block;
        }

        .ten-db {
            font-weight: 900; font-size: 17px;
            color: var(--name-red); margin: 8px 0 3px 0;
            text-transform: uppercase;
        }

        .chuc-vu-db {
            font-weight: 700; font-size: 11px;
            opacity: 0.8; letter-spacing: 1px;
            text-transform: uppercase;
        }

        .cong-tac {
            font-size: 11px;
            font-style: italic;
            color: #444;
            margin-top: 5px;
            max-width: 200px;
            line-height: 1.4;
        }

        @media (max-width: 1100px) { .dv-list-horizontal { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { 
            .dv-list-horizontal { grid-template-columns: 1fr; } 
            .summary-units { justify-content: flex-start; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-title">
            <p style="font-weight:900; color: #b8860b; margin-bottom: 5px; letter-spacing: 3px;">HỘI ĐỒNG NHÂN DÂN</p>
            <h1>XÃ BẮC RUỘNG</h1>
            <p style="font-weight:700; opacity:0.8; letter-spacing: 2px;">KHÓA XIII | NHIỆM KỲ 2026 - 2031</p>
            
            <div class="summary-units" id="summary-units">
                <span class="unit-chip active" onclick="filterUnit('all', this)">Tất cả Đơn vị</span>
            </div>
        </div>
        
        <div id="render-target"></div>
    </div>

    <script>
        // Bạn có thể thay đổi giá trị trong trường 'congTac' của từng đại biểu bên dưới
        const danhSach = [
            { dv: "Đơn vị số 1 (Thôn 1 & 2)", mau: "#1e3799", db: [
                { ten: "Lê Thị Mỹ Dung", anh: "https://lh3.googleusercontent.com/d/1muOGqYCqwkBeEMV2IWgQtRV6KijgqrnR", congTac: "Phó Giám đốc Trạm Y tế xã Bắc Ruộng" },
                { ten: "Phạm Văn Tám", anh: "https://lh3.googleusercontent.com/d/1m07i2nFENJtkfHAOzor22bY3iGZlWHbw", congTac: "Thôn phó, Thôn 1 xã Bắc Ruộng" },
                { ten: "Nguyễn Đức Tân", anh: "https://lh3.googleusercontent.com/d/1cYeCtg4qQsqyTaJkKfYCL8f9cauOG6Rn", congTac: " Phó Trưởng ban Kinh tế Ngân sách HĐND xã" },
                { ten: "Đoàn Công Thôi", anh: "https://lh3.googleusercontent.com/d/1W_ZVCQqAWRAFtJ0m0dchzwG5bO1erK7U", congTac: "Chủ tịch Uỷ ban MTTQ Việt Nam xã" }
            ]},
            { dv: "Đơn vị số 2 (Thôn 3 & 4)", mau: "#eb4d4b", db: [
                { ten: "Trần Thanh Hải", anh: "https://lh3.googleusercontent.com/d/1f5h4XER6XgkXcXdR8Tjnvv744ghkOYOj", congTac: "Phó Phòng Kinh tế xã" },
                { ten: "Đào Ngọc Hoài", anh: "https://lh3.googleusercontent.com/d/1Nm2qrhjE6E2kpjndZCD0XUYz2wg6JHpL", congTac: "Phó Bí thư, Chủ tịch UBND xã" },
                { ten: "Cáp Kim Thành", anh: "https://lh3.googleusercontent.com/d/1IZ0nQ0DG08vAHGIInqQe6omzFdtdTZGw", congTac: "Phó Chủ tịch Ủy ban MTTQ Việt Nam, Chủ tịch Hội Nông dân xã" }
            ]},
            { dv: "Đơn vị số 3 (Măng Tố 1 & 3)", mau: "#20bf6b", db: [
                { ten: "Rong Văn Dung", anh: "https://lh3.googleusercontent.com/d/1zMvXLpqFgWh8gCnCrbvFPfkJhyMzsiQc", congTac: "Bí thư Chi bộ Thôn Măng tố 1" },
                { ten: "Lê Văn Lâm", anh: "https://lh3.googleusercontent.com/d/1hDZP2YdXoAvwUhlocEAxYSq7AirsWd2x", congTac: "Phó Chủ tịch HĐND xã" },
                { ten: "Nguyễn Hữu Phúc", anh: "https://lh3.googleusercontent.com/d/1x8WAg1J1WgeZkVvmGX9aPZ2z1FC84D39", congTac: "Trưởng Công an xã" },
                { ten: "Phan Văn Tấn", anh: "https://lh3.googleusercontent.com/d/15q7_RdTZLc20OLqWCtxXZO9lsRgMWV2N", congTac: "Bí thư Đảng ủy xã" }
            ]},
            { dv: "Đơn vị số 4 (Măng Tố 2 & Đức Tân 5)", mau: "#f39c12", db: [
                { ten: "Nguyễn Minh Hải", anh: "https://lh3.googleusercontent.com/d/16aMx4iJHd40kLU7zLdx0L21klWAWLa--", congTac: "Phó Chủ tịch UBND xã" },
                { ten: "Nguyễn Thị Thu Hiếu", anh: "https://lh3.googleusercontent.com/d/1M4UbhsenMi9pr9CiapxGg30MdUbuSfM6", congTac: "Trưởng Ban công tác Mặt trận Thôn Măng tố 2" },
                { ten: "Lê Thanh Thăng", anh: "https://lh3.googleusercontent.com/d/1yrQIuvMgnqW2g4xFCIt2cpqtSReejy0a", congTac: "Phó Trưởng ban Văn hóa Xã hội HĐND xã" },
                { ten: "Hoàng Thị Thanh Thủy", anh: "https://lh3.googleusercontent.com/d/1NjxVUsUF_ZewptpNk92yJ48WmhvDr57G", congTac: "Trưởng Ban xây dựng Đảng, Trưởng ban VHXH HĐND xã" }
            ]},
            { dv: "Đơn vị số 5 (Đức Tân 4 & 8)", mau: "#8e44ad", db: [
                { ten: "Bùi Thị Ngọc Bích", anh: "https://lh3.googleusercontent.com/d/1q5U5PL9FcZxRICXxdCDlM0AC6iX7B2OP", congTac: "Trưởng thôn Đức Tân 4" },
                { ten: "Nguyễn Văn Hà", anh: "https://lh3.googleusercontent.com/d/1exND1ZMOD_3C-HZXum0q82vzyI0b-HKx", congTac: "Chỉ huy trưởng BCH Quân sự xã" },
                { ten: "Lưu Đức Lợi", anh: "https://lh3.googleusercontent.com/d/1Nc5S_pBR5DoTmATLLuNpB8G3_dXfBLqc", congTac: "Phó Chủ tịch UBND xã- Kiêm Giám đốc Trung tâm Dịch vụ tổng hợp" },
                { ten: "Nguyễn Văn Thành", anh: "https://lh3.googleusercontent.com/d/1tZ99Q76MhSxJRT-vDmJmQw902GZ9D6-3", congTac: "Phó Bí thư Thường trực Đảng ủy" }
            ]},
            { dv: "Đơn vị số 6 (Đức Tân 6 & 7)", mau: "#d35400", db: [
                { ten: "Đỗ Duy Nghĩa", anh: "https://lh3.googleusercontent.com/d/1To6E0Il_9fBeTBAV48sNPJo4pFjHWJ_P", congTac: "Chủ nhiệm UBKT , Trưởng ban Kinh tế - Ngân sách HĐND xã" },
                { ten: "Chu Thị Hoài Thương", anh: "https://lh3.googleusercontent.com/d/1vRYQ-ofiV5z11d9Jr3tbnl415eyf5r5C", congTac: "Trưởng thôn Đức Tân 6" },
                { ten: "Mai Hữu Tuấn", anh: "https://lh3.googleusercontent.com/d/1i4ws3KdOls92ZAR7f8Qu8v0zkoYfXvtm", congTac: "Phó Trưởng phòng Văn hóa Xã hội xã" },
                { ten: "Trương Nhật Tường", anh: "https://lh3.googleusercontent.com/d/1n1JtNoDRVSIZCfz5_tvqaX35nM-FQJqV", congTac: "Nhân viên Phòng Kinh tế xã" }
            ]}
        ];

        const target = document.getElementById('render-target');
        const summaryTarget = document.getElementById('summary-units');

        function filterUnit(dvId, element) {
            document.querySelectorAll('.unit-chip').forEach(chip => chip.classList.remove('active'));
            element.classList.add('active');
            const sections = document.querySelectorAll('.dv-section');
            sections.forEach(section => {
                section.style.display = (dvId === 'all' || section.id === dvId) ? 'block' : 'none';
            });
            if (dvId !== 'all') {
                const targetSection = document.getElementById(dvId);
                targetSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            checkReveal();
        }

        danhSach.forEach((item, idx) => {
            const dvId = `dv-${idx}`;
            const chip = document.createElement('span');
            chip.className = 'unit-chip';
            chip.innerText = item.dv;
            chip.onclick = () => filterUnit(dvId, chip);
            summaryTarget.appendChild(chip);

            const section = document.createElement('div');
            section.className = 'dv-section';
            section.id = dvId;
            section.style.setProperty('--unit-color', item.mau);
            section.innerHTML = `<div class="dv-header">❖ ${item.dv}</div>`;

            const listContainer = document.createElement('div');
            listContainer.className = 'dv-list-horizontal';

            item.db.forEach((person, pIdx) => {
                const member = document.createElement('div');
                member.className = 'dai-bieu-item';
                member.style.transitionDelay = `${pIdx * 0.05}s`; 
                member.innerHTML = `
                    <div class="avatar-box">
                        <img src="${person.anh.trim()}" 
                             onerror="this.onerror=null; this.src='https://via.placeholder.com/300x400/9f0303/ffffff?text=HĐND';" 
                             alt="${person.ten}">
                    </div>
                    <div class="chuc-vu-db">ĐẠI BIỂU HĐND</div>
                    <div class="ten-db">${person.ten}</div>
                    <div class="cong-tac">${person.congTac}</div>
                `;
                listContainer.appendChild(member);
            });
            section.appendChild(listContainer);
            target.appendChild(section);
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('reveal');
            });
        }, { threshold: 0.1 });

        function checkReveal() {
            document.querySelectorAll('.dai-bieu-item').forEach(item => observer.observe(item));
        }
        checkReveal();
    </script>
</body>
</html>
